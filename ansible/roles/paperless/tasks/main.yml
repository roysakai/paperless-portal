- name: Create directory for Paperless
  file:
    path: /opt/paperless
    state: directory
    mode: '0755'

- name: Copy docker-compose.yml
  copy:
    src: ../../../docker-compose.yml
    dest: /opt/paperless/docker-compose.yml

- name: Copy .env file from template
  template:
    src: env.j2
    dest: /opt/paperless/.env
  vars:
    domain: "{{ lookup('env', 'DOMAIN') | default('localhost') }}"

- name: Create data directories
  file:
    path: "/opt/paperless/{{ item }}"
    state: directory
    owner: 1000
    group: 1000
  loop:
    - data
    - media
    - redis
    - db

- name: Start Paperless stack using Docker Compose CLI
  command:
    cmd: docker compose up -d
    chdir: /opt/paperless
  register: compose_result
  changed_when: "'Starting' in compose_result.stdout or 'Creating' in compose_result.stdout"